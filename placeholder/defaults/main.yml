---
# Common defaults
sysctl_conf_file: "{{ '/etc/sysctl.d/99-sysctl.conf' if ansible_os_family == 'VMware Photon OS' else '/etc/sysctl.conf' }}"

# CA Certs
ca_cert_path: "/etc/haproxy/ca"
ca_key_path: "/etc/haproxy/ca"
ca_cert_name: "ca"
ca_common_name: "MANAGEMENT_IPV4"
ca_org_name: "VMware"
ca_org_unit_name: "CAPV"
ca_country: "US"
ca_state: "California"
ca_locality: "Palo Alto"

ca_valid_days: "+3650d"

# Server Certs
ssl_cert_path: "/etc/haproxy/certs"
ssl_key_path: "/etc/haproxy/private"
ssl_cert_name: "server"
ssl_common_name: "HOSTNAME_FQDN"
ssl_org_name: "VMware"
ssl_org_unit_name: "CAPV"
ssl_country: "US"
ssl_state: "California"
ssl_locality: "Palo Alto"

# v3 Extensions
ssl_dns_alt_names:
  - "HOSTNAME_FQDN"
  - "localhost"

ssl_valid_days: "+1825d"

# addresses and routings
hostname_fqdn: HOSTNAME_FQDN
management_ipv4: MANAGEMENT_IPV4
workload_ipv4: WORKLOAD_IPV4
frontend_ipv4: FRONTEND_IPV4

management_ipv4_cidr: MANAGEMENT_IPV4_CIDR
management_dns: MANAGEMENT_DNS
management_gtw: MANAGEMENT_GTW

workload_ipv4_cidr: WORKLOAD_IPV4_CIDR
workload_gtw: WORKLOAD_GTW

frontend_ipv4_cidr: FRONTEND_IPV4_CIDR
frontend_gtw: FRONTEND_GTW

frontend_vip_cidr: FRONTEND_VIP_CIDR

# dataplaneapi credentials
dpapi_username: DPAPI_USERNAME
dpapi_password_hash: DPAPI_PASSWORD_HASH
