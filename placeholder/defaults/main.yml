---
ssl_cert_path: "/etc/haproxy/certs"
ssl_key_path: "/etc/haproxy/private"
ssl_cert_name: "haproxy"

ssl_common_name: "haproxy-vmware"
ssl_org_name: "PT. Adalah Pokoknya"
ssl_country: "ID"
ssl_state: "Jawa Barat"
ssl_locality: "Depok"

# v3 Extensions
ssl_dns_alt_names:
  - "haproxy-vmware"

ssl_valid_days: "+365d"

management_ipv4: MANAGEMENT_IPV4
workload_ipv4: WORKLOAD_IPV4
frontend_ipv4: FRONTEND_IPV4

management_ipv4_cidr: MANAGEMENT_IPV4_CIDR
management_dns: MANAGEMENT_DNS
management_gtw: MANAGEMENT_GTW

workload_ipv4_cidr: WORKLOAD_IPV4_CIDR
workload_gtw: WORKLOAD_GTW

frontend_ipv4_cidr: FRONTEND_IPV4_CIDR
frontend_gtw: FRONTEND_GTW

frontend_vip_cidr: FRONTEND_VIP_CIDR
