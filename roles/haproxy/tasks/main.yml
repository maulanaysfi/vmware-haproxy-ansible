---

- name: Check if HAProxy binary file exists
  stat:
    path: /root/haproxy-3.2.1-1.ph5.x86_64.rpm
  register: dataplaneapi_binary

- name: Copy HAProxy binary file
  copy:
    src: files/binary/haproxy-3.2.1-1.ph5.x86_64.rpm
    dest: /root/haproxy-3.2.1-1.ph5.x86_64.rpm
    owner: root
    group: root
    mode: "0755"
  when: not dataplaneapi_binary.stat.exists

- name: Install HAProxy 3.2.1
  shell: |
    tdnf install /root/haproxy-3.2.1-1.ph5.x86_64.rpm -y

- name: Delete default HAProxy configuration
  file:
    path: /etc/haproxy/haproxy.cfg
    state: absent
  when: ansible_default_ipv4.alias != "management"

- name: Check if DataPlane API binary file exists
  stat:
    path: /root/dataplaneapi_2.9.21_linux_amd64.rpm
  register: dataplaneapi_binary

- name: Copy DataPlane API binary file
  copy:
    src: files/binary/dataplaneapi_2.9.21_linux_amd64.rpm
    dest: /root/dataplaneapi_2.9.21_linux_amd64.rpm
    owner: root
    group: root
    mode: "0755"
  when: not dataplaneapi_binary.stat.exists

- name: Install DataPlane API 2.9.21 
  shell: |
    rpm -Uvh /root/dataplaneapi_2.9.21_linux_amd64.rpm || true

- name: Check if DataPlane API configuration file exists
  stat:
    path: /etc/haproxy/dataplaneapi.yml
  register: dataplaneapi_config

- name: Generate Data Plane API configuration file
  template:
    src: dataplaneapi.j2
    dest: /etc/haproxy/dataplaneapi.yml
    owner: root
    group: root
    mode: "0644"
  when: not dataplaneapi_config.stat.exists

- name: Check if HAProxy configuration file exists
  ansible.builtin.stat:
    path: /etc/haproxy/haproxy.cfg
  register: haproxy_config

- name: Create HAProxy configuration file
  copy:
    src: files/etc/haproxy/haproxy.cfg
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  when: not haproxy_config.stat.exists

- name: Set Dataplane API default configuration dir
  copy:
    src: files/etc/default/dataplaneapi
    dest: /etc/default/dataplaneapi
    owner: root
    group: root
    mode: "0644"

- name: Update HAProxy log level
  replace:
    path: /etc/haproxy/haproxy.cfg
    regexp: 'log stdout format raw local0 debug'
    replace: 'log stdout format raw local0 info'

- name: Enable HAProxy service
  systemd:
    name: haproxy
    enabled: yes
    daemon_reload: yes

- name: Enable Dataplane API service
  systemd:
    name: dataplaneapi
    enabled: yes
    daemon_reload: yes
